!
! Last configuration change at 13:50:34 UTC Sun Nov 6 2022
!
! the configuration file needs to have a version statement
!
version 17.6
!
hostname ro01
ip domain name home.intern
!
no ip domain lookup
!
no aaa new-model
!
login on-success log
!
license feature hseck9
!
username admin privilege 15 secret admin
!
logging host 192.168.10.133
!
vtp mode off
!
interface Vlan1
 ip address dhcp
 autostate
 no shutdown
!
vlan 10
 name test
!
int vlan 10
 desc test
 ip address dhcp
 no shutdown
!
int ra gi 0/1/0
 switchport access vlan 10
 no shut
!
interface GigabitEthernet0/0/0
 ip address dhcp
 no shutdown
 ip nat outside
!
ip http server
ip http authentication local
ip http secure-server
!
ip ssh rsa keypair-name ssh-key
ip ssh version 2
ip scp server enable
!
line con 0
 privilege level 15
 logging synchronous
 width 150
 exec-timeout 0 0
!
line vty 0 31
 exec-timeout 120 0
 privilege level 15
 logging synchronous
 login local
 width 150
 transport input ssh
!
clock timezone CET 1 0
clock summer-time CEST recurring las Sun Mar 2:00 las Sun Oct 3:00
ntp server 10.10.10.1
!
!
! EEM script to cleanup after first reload
! - create ssh key
! - remove pnp template --> ends pnp workflow
! - remove eem script
! - save configuration
! - remove inactive images
!
event manager applet finish
 description finish config after reload
 ! remove inactive images may teke som time, so let it run long enough
 event timer cron cron-entry "@reboot" maxrun 1200 name finish
 ! set defaults
 action 0000.00 cli command "enable"
 action 0000.01 cli command "term len 0"
 action 0000.02 syslog facility "EEM" msg "EEM START finish config"
 action 0000.03 handle-error type warn
 !
 action 0010.00 syslog facility "EEM" msg "generating ssh key"
 action 0010.05 cli command "configure terminal"
 action 0010.10 cli command "  crypto key generate rsa modulus 2048 label SSH-KEY"
 action 0010.15 cli command "  ip ssh rsa keypair-name SSH-KEY"
 !
 action 0100.00 syslog facility "EEM" msg "remove pnp profile pnp-zero-touch"
 action 0100.05 cli command "  no pnp profile pnp-zero-touch"
 action 0100.10 syslog facility "EEM" msg "remove EEM script finish config"
 action 0100.15 cli command "  no event manager applet finish"
 action 0100.20 cli command "end"
 action 0100.25 cli command "write memory"
 !
 action 0200.00 syslog facility "EEM" msg "remove inactive IOS-XE images"
 action 0200.05 cli command "install remove inactive" pattern "\[y/n\]"
 action 0200.10 cli command "y"
 ! 
 action 9999.99 syslog facility "EEM" msg "EEM END finish config" 
exit
!
! the configuration has to end with "end"
!
end
