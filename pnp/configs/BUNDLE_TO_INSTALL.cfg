event manager applet pnp_bundle_to_install authorization bypass
 event timer countdown time 30 maxrun 3600 name pnp_bundle_to_install
 action 1.0 cli command "enable"
 action 2.0 cli command "terminal length 0"
 action 3.0 cli command "software expand running to flash:"
 action 4.0 cli command "show version | include System image file is"
 action 5.0 regexp "flash:([^\" ]+\\.bin)" "$_cli_result" match image
 action 6.0 if $_regexp_result eq "1"
 action 6.1  cli command "conf t"
 action 6.2  cli command "no boot system switch all flash:$image"
 action 6.3  cli command "boot system switch all flash:packages.conf"
 action 6.4  cli command "end"
 action 6.5  cli command "write memory"
 action 6.6  cli command "reload in 1 reason pnp-bundle-to-install"
 action 6.7 else
 action 6.8  syslog msg "pnp bundle_to_install: no .bin found, already in INSTALL mode?"
 action 6.9 end
