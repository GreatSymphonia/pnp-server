!
! the configuration needs to start with a version setting.
!
version 15.2
!
! set the correct boot variable
!
boot system flash c3560c405ex-universalk9-mz.152-2.E10.bin
!
! here follows your configuration
!
hostname device1
!
ip domain name autoinstall.test
!
username admin privilege 15 password admin
!
ip ssh rsa keypair-name SSH-KEY
ip ssh version 2
!
int ra gi 0/1-10
 switchport mode access
 load-interval 30
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 width 150
!
line vty 0 15
 privilege level 15
 logging synchronous
 width 150
 login local
!
! here follows the EEM script to finish the configuration after reload
!
event manager applet finish
description clear all config after reload
event timer cron cron-entry "@reboot" maxrun 600 name finish
! set defaults
 action 0000.00 cli command "enable"
 action 0000.01 cli command "term len 0"
 action 0000.02 syslog facility "EEM" msg "EEM START finish config"
 action 0000.03 handle-error type warn
 ! 
 action 0010.00 syslog facility "EEM" msg "generating ssh key"
 action 0010.05 cli command "configure terminal"
 action 0010.10 cli command "  crypto key generate rsa modulus 2048 label SSH-KEY"
 action 0010.15 cli command "  ip ssh rsa keypair-name SSH-KEY"
 action 0010.20 cli command "end"
 !
 action 9999.00 cli command "event manager run remove"
 action 9999.99 syslog facility "EEM" msg "EEM END finish config"
 exit
!
! this EEM script will do the cleanup after the EEM finsh config script is done
! depending on your device it will not remove itself :-(
!
event manager applet remove
 event none maxrun 600
 action 0000.00 cli command "enable"
 action 0000.05 wait 30
 action 9999.05 cli command " configure terminal"
 action 9999.10 cli command "  no event manager applet finish"
 action 9999.15 cli command "  do write memory"
 action 9999.20 syslog facility "EEM" msg "EEM END autoinstall"
 action 9999.25 cli command "  no event manager applet remove"
 action 9999.80 cli command "  do write memory"
 exit
!
! the config file ends to end with "end"
!
end
